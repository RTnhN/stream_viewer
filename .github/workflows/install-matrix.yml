name: Test Package Install

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  install-and-smoke-test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install uv and set Python
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Install Linux runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
          curl -L https://github.com/sccn/liblsl/releases/download/v1.17.7/liblsl-1.17.7-noble_amd64.deb -o liblsl.deb
          sudo apt-get install -y ./liblsl.deb

      - name: Install macOS liblsl
        if: runner.os == 'macOS'
        run: |
          curl -L https://github.com/sccn/liblsl/releases/download/v1.17.7/liblsl-1.17-Darwin-universal.pkg -o liblsl.pkg
          sudo installer -pkg liblsl.pkg -target /

      - name: Install Windows liblsl
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest https://github.com/sccn/liblsl/releases/download/v1.17.7/liblsl-1.17.7-Win_amd64.zip -OutFile liblsl.zip
          Expand-Archive liblsl.zip -DestinationPath liblsl
          $dll = Get-ChildItem liblsl -Recurse -Filter liblsl.dll | Select-Object -First 1 -ExpandProperty FullName
          "PYLSL_LIB=$dll" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Sync project
        run: uv sync --locked

      - name: Confirm installed package
        run: uv run python -c "import stream_viewer; print(stream_viewer.__version__)"

      - name: Smoke test GUI startup
        run: uv run python -m unittest tests.test_smoke
