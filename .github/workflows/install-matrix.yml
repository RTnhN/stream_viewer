name: Test Package Install

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.12"
          - "3.13"
          - "3.14"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Linux runtime dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1
          python - <<'PY' > liblsl_asset_url.txt
          import json
          import urllib.request
          from pathlib import Path

          os_release = Path("/etc/os-release").read_text().splitlines()
          version_codename = next(
              line.split("=", 1)[1]
              for line in os_release
              if line.startswith("VERSION_CODENAME=")
          ).strip().strip('"')

          with urllib.request.urlopen("https://api.github.com/repos/sccn/liblsl/releases/latest") as response:
              release = json.load(response)

          asset_name_suffix = f"{version_codename}_amd64.deb"
          asset_url = next(
              asset["browser_download_url"]
              for asset in release["assets"]
              if asset["name"].endswith(asset_name_suffix)
          )
          print(asset_url)
          PY
          curl -L "$(cat liblsl_asset_url.txt)" -o liblsl.deb
          sudo apt-get install -y ./liblsl.deb

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: python -m pip install .

      - name: Confirm installed metadata
        run: python -m pip show stream-viewer

      - name: Smoke test GUI startup
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m unittest tests.test_smoke
